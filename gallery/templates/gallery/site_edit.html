{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Edit {{ object.name }}{% endblock %}
{% block block_title %}{{ object.name }}{% endblock %}
{% block content %}
<div class="container mt-3">
<h1>Edit Site</h1>
<form action="" method="post" enctype="multipart/form-data">{% csrf_token %}
  {{ form|crispy }}
  <button class="btn btn-info ms-2" type="submit">Update</button>
  <a class="btn btn-secondary ms-2" href="{{ object.get_absolute_url }}">Cancel</a>
</form>
</div>
{% endblock %}
