{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}
<h1>New Artist</h1>
{% if form.errors %}<div class="alert alert-danger">Please correct the highlighted fields below.</div>{% endif %}
<form action="" method="post" enctype="multipart/form-data" data-has-image="{% if object.image %}1{% endif %}">{% csrf_token %}
  {% crispy form %}
  <button class="btn btn-success ms-2" type="submit">Save</button>
</form>
{% endblock content %}

{% block extra_js %}
<script src="{% static 'js/artist_form_validate.js' %}"></script>
{% endblock %}
