{% extends 'base.html' %}
{% block title %}Delete {{ object.name }}{% endblock %}
{% block content %}
<div class="container mt-3">
<h1>Delete Site</h1>
<p>Are you sure you want to delete <strong>{{ object.name }}</strong>? This cannot be undone.</p>
<form method="post">{% csrf_token %}
  <button type="submit" class="btn btn-danger">Delete</button>
  <a class="btn btn-secondary ms-2" href="{{ object.get_absolute_url }}">Cancel</a>
</form>
</div>
{% endblock %}
