{% extends 'base.html' %}

{% block title %}Search{% endblock %}
{% block block_title %}Search{% endblock %}

{% block content %}
<form class="d-flex mb-3 col-4 mx-auto mt-4" method="get">
	<input class="form-control me-2" type="search" name="q" value="{{ query }}" placeholder="Search artists and artworks">
	<select name="tag">
		<option value="">All tags</option>
		{% for tag in available_tags %}
			<option value="{{ tag.slug }}" {% if active_tag == tag.slug %}selected{% endif %}>{{ tag.name }}</option>
		{% endfor %}
	</select>
	<button class="btn btn-outline-success" type="submit">Search</button>
</form>
<h1>Search Results</h1>
{% for artist in artist_list %}
<h3><a class="card__link" href="{{ artist.get_absolute_url }}">{{ artist.name }}</a></h3>
{% endfor %}
{% for artwork in artwork_list %}
<h3><a class="card__link" href="{{ artwork.get_absolute_url }}">{{ artwork.name }}</a></h3>
{% endfor %}
{% endblock %}
